services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webhookdb
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook -d webhookdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://webhook:webhook@db:5432/webhookdb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
